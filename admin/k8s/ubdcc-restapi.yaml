apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: ubdcc-restapi
  namespace: ubdcc
  annotations:
    author: oliver-zehentleitner
spec:
  selector:
    matchLabels:
      app: ubdcc-restapi
  template:
    metadata:
      labels:
        app: ubdcc-restapi
      annotations:
        author: oliver-zehentleitner
    spec:
      containers:
        - name: ubdcc-restapi
          image: ghcr.io/oliver-zehentleitner/ubdcc-restapi:0.9.1
          ports:
            - name: rest-private
              containerPort: 8080
          # Set UBDCC_K8S_VERIFY_SSL to "false" only if your cluster's
          # Kubernetes API server certificate is rejected by strict X.509
          # verification. This disables TLS verification for the in-cluster
          # Kubernetes API calls and is INSECURE - use with care.
          env:
            - name: UBDCC_K8S_VERIFY_SSL
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /test
              port: rest-private
            initialDelaySeconds: 40
          livenessProbe:
            httpGet:
              path: /test
              port: rest-private
            initialDelaySeconds: 40
