apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ubdcc-mgmt
  namespace: ubdcc
  annotations:
    author: oliver-zehentleitner
spec:
  serviceName: "ubdcc-mgmt"
  replicas: 1
  selector:
    matchLabels:
      app: ubdcc-mgmt
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ubdcc-mgmt
      annotations:
        author: oliver-zehentleitner
    spec:
      containers:
        - name: ubdcc-mgmt
          image: ghcr.io/oliver-zehentleitner/ubdcc-mgmt:0.9.1
          ports:
            - name: rest-private
              containerPort: 8080
          # Set UBDCC_K8S_VERIFY_SSL to "false" only if your cluster's
          # Kubernetes API server certificate is rejected by strict X.509
          # verification. This disables TLS verification for the in-cluster
          # Kubernetes API calls and is INSECURE - use with care.
          env:
            - name: UBDCC_K8S_VERIFY_SSL
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
